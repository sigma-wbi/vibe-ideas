name: Deploy to GitHub Pages

# NOTE: 자동 배포(push 트리거) 비활성화됨.
# 공개 호스팅 방식을 결정한 뒤에만 수동 실행(Run workflow)하거나 push 트리거를 복구하세요.
# 공개 노출이 의도와 다를 수 있으므로, private 저장소라도 GitHub Pages는 공개 URL이 될 수 있음에 주의.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install, build, and upload
        uses: withastro/action@v5
        with:
          path: ./dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
